name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  test:
    name: Go and Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: internal/serve/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: internal/serve/frontend
        run: npm ci

      - name: Build embedded frontend
        working-directory: internal/serve/frontend
        run: npm run build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check gofmt
        shell: bash
        run: |
          files="$(git ls-files '*.go')"
          if [ -z "$files" ]; then
            exit 0
          fi

          unformatted="$(printf '%s\n' "$files" | xargs gofmt -l)"
          if [ -n "$unformatted" ]; then
            echo "The following Go files need formatting:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...
